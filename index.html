<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Calculator and Unit Converter</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .calculator, .converter { display: none; }
        .active { display: block; }
        .tab { cursor: pointer; padding: 10px; background: #f1f1f1; margin: 5px; }
        #calculator-display { width: 100%; height: 50px; text-align: right; font-size: 24px; }
        button { width: 60px; height: 60px; font-size: 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Multi-Calculator and Unit Converter</h1>
    <div>
        <div class="tab" onclick="showTab('calculator')">Calculator</div>
        <div class="tab" onclick="showTab('converter')">Converter</div>
    </div>
    <div id="calculator" class="calculator active">
        <input type="text" id="calculator-display" value="0" readonly />
        <div>
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button onclick="setOperation('/')">/</button>
        </div>
        <div>
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button onclick="setOperation('*')">*</button>
        </div>
        <div>
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="setOperation('-')">-</button>
        </div>
        <div>
            <button onclick="clearDisplay()">C</button>
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="calculateResult()">=</button>
            <button onclick="setOperation('+')">+</button>
        </div>
    </div>
    <div id="converter" class="converter">
        <h2>Select a unit converter:</h2>
        <select id="unit-selector">
            <option value="currency">Currency</option>
            <option value="length">Length</option>
            <option value="weight">Weight</option>
            <option value="mass">Mass</option>
            <option value="area">Area</option>
            <option value="time">Time</option>
            <option value="data">Data</option>
            <option value="discount">Discount</option>
            <option value="volume">Volume</option>
            <option value="numeral-system">Numeral System</option>
            <option value="speed">Speed</option>
            <option value="temperature">Temperature</option>
            <option value="bmi">BMI</option>
        </select>
        <div id="converter-display">Converter result will be shown here.</div>
    </div>
    <script>
        function showTab(tab) {
            document.querySelector('.calculator').classList.remove('active');
            document.querySelector('.converter').classList.remove('active');
            document.getElementById(tab).classList.add('active');
        }
        function appendToDisplay(value) {
            let display = document.getElementById('calculator-display');
            if (display.value === "0") display.value = value;
            else display.value += value;
        }
        function setOperation(operator) {
            // Logic for setting the operation
        }
        function calculateResult() {
            // Logic for calculating result
        }
        function clearDisplay() {
            document.getElementById('calculator-display').value = '0';
        }
    </script>
</body>
</html>
