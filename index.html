<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akib's Ultimate AI-Calculator</title>
    <style>
        :root { --bg: #000; --disp: #1a1a1a; --accent: #ff8800; --sci: #34495e; --geo: #8e44ad; --abc: #27ae60; }
        body { font-family: 'Courier New', monospace; background: #111; color: white; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .calc-body { width: 100vw; height: 100vh; max-width: 450px; background: var(--bg); display: flex; flex-direction: column; }
        
        .display-area { background: var(--disp); padding: 20px; text-align: right; border-bottom: 3px solid #333; position: relative; min-height: 120px; }
        #mode-label { position: absolute; left: 10px; top: 10px; color: var(--accent); font-size: 12px; font-weight: bold; }
        #input-view { color: #888; font-size: 18px; min-height: 25px; letter-spacing: 1px; word-break: break-all; margin-top: 15px; }
        #result-view { color: #fff; font-size: 45px; margin-top: 10px; text-shadow: 0 0 10px rgba(255,255,255,0.2); font-weight: bold; }

        .top-bar { display: flex; justify-content: space-between; padding: 10px; background: #222; }
        .top-btn { padding: 8px 15px; border-radius: 5px; border: none; color: white; cursor: pointer; font-size: 12px; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; flex-grow: 1; }
        button { height: 100%; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; color: white; background: #333; transition: 0.1s; display: flex; align-items: center; justify-content: center; }
        button:active { filter: brightness(1.5); transform: scale(0.95); }
        
        .op { color: var(--accent); font-weight: bold; font-size: 22px; }
        .alpha-btn { background: var(--abc); font-size: 14px; font-weight: bold; }
        .sci-btn { background: var(--sci); font-size: 14px; }
        .geo-btn { background: var(--geo); font-size: 14px; }
        .eq { grid-column: span 2; background: var(--accent); color: black; font-weight: bold; font-size: 22px; }
        .ac { background: #c0392b; font-weight: bold; }

        #alphabet-panel { display: none; grid-template-columns: repeat(6, 1fr); gap: 5px; padding: 10px; background: #111; border-top: 2px solid var(--abc); }
        .abc-key { height: 45px; font-size: 14px; background: #222; color: var(--abc); border: 1px solid #333; }
    </style>
</head>
<body>

<div class="calc-body">
    <div class="top-bar">
        <button class="top-btn" style="background:var(--geo)" onclick="switchMode('GEO')">Geometry</button>
        <button class="top-btn" style="background:var(--accent)" onclick="openConverter()">Converter</button>
    </div>

    <div class="display-area">
        <div id="mode-label">STANDARD</div>
        <div id="input-view"></div>
        <div id="result-view">0</div>
    </div>

    <div class="grid" id="main-grid">
        <button class="alpha-btn" onclick="toggleABC()">ABC</button>
        <button class="sci-btn" onclick="add('Math.sin(')">sin</button>
        <button class="sci-btn" onclick="add('Math.cos(')">cos</button>
        <button class="sci-btn" onclick="add('Math.tan(')">tan</button>
        <button class="ac" onclick="cls()">AC</button>

        <button class="sci-btn" onclick="add('Math.sqrt(')">√</button>
        <button class="sci-btn" onclick="add('**2')">x²</button>
        <button class="sci-btn" onclick="add('**')">^</button>
        <button class="sci-btn" onclick="add('Math.PI')">π</button>
        <button class="op" onclick="add('/')">÷</button>

        <button onclick="add(7)">7</button>
        <button onclick="add(8)">8</button>
        <button onclick="add(9)">9</button>
        <button class="op" onclick="add('*')">×</button>
        <button class="op" onclick="del()">DEL</button>

        <button onclick="add(4)">4</button>
        <button onclick="add(5)">5</button>
        <button onclick="add(6)">6</button>
        <button class="op" onclick="add('-')">-</button>
        <button class="sci-btn" onclick="addConst('G')">G</button>

        <button onclick="add(1)">1</button>
        <button onclick="add(2)">2</button>
        <button onclick="add(3)">3</button>
        <button class="op" onclick="add('+')">+</button>
        <button class="sci-btn" onclick="addConst('g')">g</button>

        <button onclick="add(0)">0</button>
        <button onclick="add('.')">.</button>
        <button class="eq" onclick="solve()">SOLVE (=)</button>
        <button class="sci-btn" onclick="addConst('R')">R</button>
    </div>

    <div id="alphabet-panel"></div>
</div>

<script>
    let inputView = document.getElementById('input-view');
    let resultView = document.getElementById('result-view');
    let modeLabel = document.getElementById('mode-label');
    let expression = "";

    const abcPanel = document.getElementById('alphabet-panel');
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    letters.forEach(l => {
        let btn = document.createElement("button");
        btn.innerText = l; btn.className = "abc-key";
        btn.onclick = () => { add(l); toggleABC(); };
        abcPanel.appendChild(btn);
    });

    function add(val) {
        expression += val;
        inputView.innerText = expression;
    }

    function addConst(c) {
        const vals = { 'G': 6.674e-11, 'g': 9.806, 'R': 8.314, 'F': 96485 };
        expression += vals[c];
        inputView.innerText = expression;
    }

    function toggleABC() {
        let pnl = document.getElementById('alphabet-panel');
        pnl.style.display = (pnl.style.display === 'grid') ? 'none' : 'grid';
        modeLabel.innerText = "ALPHABET MODE";
    }

    function switchMode(mode) {
        modeLabel.innerText = mode + " MODE";
        if(mode === 'GEO') {
            alert("Geometry Mode: Enter Area/Volume formula or values.");
            expression = "Math.PI * "; 
            inputView.innerText = expression;
        }
    }

    function solve() {
        try {
            let tempExp = expression;
            if (/[A-Z]/.test(tempExp)) {
                let variables = tempExp.match(/[A-Z]/g);
                variables.forEach(v => {
                    let val = prompt(`Enter value for ${v}:`);
                    tempExp = tempExp.replace(new RegExp(v, 'g'), val);
                });
            }

            let open = (tempExp.match(/\(/g) || []).length;
            let close = (tempExp.match(/\)/g) || []).length;
            while(open > close) { tempExp += ")"; close++; }

            let res = eval(tempExp.replace(/×/g, '*').replace(/÷/g, '/'));
            resultView.innerText = Number.isInteger(res) ? res : res.toFixed(6);
        } catch (e) {
            resultView.innerText = "Error";
        }
    }

    function openConverter() {
        window.location.href = "converter.html"; 
    }

    function cls() { expression = ""; inputView.innerText = ""; resultView.innerText = "0"; modeLabel.innerText = "STANDARD"; }
    function del() { expression = expression.slice(0, -1); inputView.innerText = expression; }
</script>

</body>
</html>
