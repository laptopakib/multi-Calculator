<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Unit Converter</title>
    <style>
        :root { --bg: #000; --accent: #ff8800; --text: #fff; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .converter-container { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .back-link { display: inline-block; color: var(--accent); text-decoration: none; margin-bottom: 20px; font-size: 14px; font-weight: bold; }
        
        h2 { text-align: center; color: var(--accent); margin-bottom: 30px; font-size: 22px; letter-spacing: 1px; }

        label { display: block; margin-bottom: 8px; color: #888; font-size: 13px; }
        
        select, input { 
            width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 2px solid #333; 
            background: #000; color: #fff; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        
        select:focus, input:focus { border-color: var(--accent); }

        .result-area { 
            background: #222; padding: 20px; border-radius: 12px; margin-top: 10px; 
            border-left: 5px solid var(--accent); min-height: 50px; display: flex; align-items: center;
        }

        #conv-res { font-size: 18px; color: #00ff88; font-weight: bold; word-break: break-all; }

        .footer-note { text-align: center; font-size: 11px; color: #555; margin-top: 30px; }
    </style>
</head>
